# Критерии синхронизированы с файлом 2026_03_31_Тренировка_входящего_звонка.xlsx (колонки H–AC, строка заголовков).
# id — латиница snake_case; name — как в таблице.

version: "2"

criteria:
  - id: greeting
    name: "Приветствие"
    description: >
      Было ли корректное приветствие в начале разговора (здравствуйте, добрый день и т.п.).

  - id: introduction
    name: "Знакомство"
    description: >
      Представился ли сотрудник (имя, роль, компания/салон при необходимости).

  - id: name_usage
    name: "Обращение по имени"
    description: >
      Обращается ли к клиенту по имени уместно и по ситуации.

  - id: proactive_communication
    name: "Инициативное общение"
    description: >
      Проявляет ли инициативу в диалоге: задаёт уточняющие вопросы, ведёт разговор, не ждёт только ответов клиента.

  - id: polite_friendly_tone
    name: "Вежливое и доброжелательное общение"
    description: >
      Общий тон: вежливость, доброжелательность, отсутствие грубости и давления.

  - id: car_interest_reason
    name: "Какое авто заинтересовало и почему"
    description: >
      Выяснил ли, какой автомобиль интересует клиента и почему (мотив, потребность).

  - id: purchase_timeline
    name: "Сроки покупки"
    description: >
      Уточнял ли сроки покупки, готовность к сделке.

  - id: alternatives_comparison
    name: "С чем сравнивает/какие альтернативы смотрит"
    description: >
      Выяснил ли, с чем клиент сравнивает вариант, какие ещё альтернативы рассматривает.

  - id: car_advantages_pitch
    name: "Рассказ о преимуществах авто"
    description: >
      Донёс ли ключевые преимущества предложенного автомобиля в контексте запроса клиента.

  - id: tech_inspection_story
    name: "Рассказ о тех проверке авто"
    description: >
      Рассказал ли о технической проверке / состоянии авто так, чтобы снять сомнения.

  - id: pt_presentation
    name: "Презентация ПТЗ"
    description: >
      Презентовал ли ПТЗ (программу/пакет/условия в терминологии вашей сети — оцени по смыслу диалога).

  - id: legal_warranty_crime_check
    name: "Рассказ о юр гарантии и крим пров."
    description: >
      Осветил ли юридическую гарантию и проверку на криминальную историю (в объёме, ожидаемом для клиента).

  - id: offer_photos_video
    name: "Предложение выслать фото и видео"
    description: >
      Предложил ли отправить фото/видео автомобиля для дистанционного интереса.

  - id: credit_scheme_pitch
    name: "Презентовать кредитную схему покупки"
    description: >
      Презентовал ли кредитную схему / условия финансирования, когда это уместно.

  - id: trade_in_pitch
    name: "Презентовать трейд ин"
    description: >
      Презентовал ли трейд-ин (обмен), когда это уместно по диалогу.

  - id: objections_handling
    name: "Работа с возражениями"
    description: >
      Реагировал ли на возражения: уточнял причины, аргументировал, не «ломался» агрессивно.

  - id: meeting_attempts
    name: "Несколько попыток договорить о встрече"
    description: >
      Делал ли несколько попыток согласовать визит в салон, если клиент колеблется.

  - id: next_contact_agreement
    name: "Фиксация договоренности о след контакте"
    description: >
      Зафиксировал ли следующий шаг: когда и как связаться, договорённость о следующем контакте.

  - id: confirm_client_phone
    name: "Уточнить контактный номер клиента"
    description: >
      Уточнил или подтвердил контактный телефон клиента.

  - id: salon_address_hours
    name: "Адрес и время работы салона"
    description: >
      Сообщил ли адрес и режим работы салона, когда это нужно для визита/ориентира.

  - id: send_sms_visiting_card
    name: "Отправить смс-визитку"
    description: >
      Предложил ли отправить СМС-визитку / контакт в сообщении по итогам разговора.

  - id: training_summary_comment
    name: "Комментарии к тренировке"
    description: >
      Краткий итоговый комментарий по тренировке: что сделано хорошо, что улучшить (не дублируй остальные критерии дословно).
