version: '2'
criteria:
- id: greeting
  name: Приветствие
  description: Было ли корректное приветствие в начале разговора (здравствуйте, добрый день и т.п.).
- id: introduction
  name: Знакомство
  description: Представился ли сотрудник (имя, роль, компания/салон при необходимости).
- id: name_usage
  name: Обращение по имени
  description: Обращается ли к клиенту по имени уместно и по ситуации.
- id: proactive_communication
  name: Инициативное общение
  description: 'Проявляет ли инициативу в диалоге: задаёт уточняющие вопросы, ведёт разговор, не ждёт только ответов клиента.'
- id: polite_friendly_tone
  name: Вежливое и доброжелательное общение
  description: 'Общий тон: вежливость, доброжелательность, отсутствие грубости и давления.'
- id: car_interest_reason
  name: Какое авто заинтересовало и почему
  description: Выяснил ли, какой автомобиль интересует клиента и почему (мотив, потребность).
